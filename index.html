<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景仓库 - 节点拆解与商业化指南</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Roboto, "Segoe UI", sans-serif;
    background: #f2f2f5;
    color: #1d1d1f;
    line-height: 1.6;
  }

  /* Header - 小红书风格头部 */
  .header {
    text-align: center;
    padding: 48px 20px 32px;
    position: relative;
    background: #fff;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #ff2442, #ff6b81);
    border-radius: 2px;
  }
  .header .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .header .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #ff2442, #ff6b81);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
  }
  .header h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; letter-spacing: 1px; }
  .header h1 span { color: #ff2442; }
  .header p { font-size: 13px; color: #86868b; margin-top: 4px; }
  .header .stats {
    display: flex; justify-content: center; gap: 32px; margin-top: 20px;
  }
  .header .stats-item { text-align: center; }
  .header .stats .num { font-size: 24px; font-weight: 700; color: #ff2442; }
  .header .stats .label { font-size: 11px; color: #86868b; margin-top: 1px; }

  /* Container - 自适应多列布局 */
  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px 40px; }

  /* 用 Flexbox 实现多列自适应（宽度由 JS 控制） */
  .grid {
    display: flex;
    flex-wrap: wrap;
    margin: -7px;
  }

  .grid > .card {
    padding: 7px;
  }

  /* Card - 小红书卡片 */
  .card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
  .card.open {
    border-color: #ff2442;
    box-shadow: 0 4px 16px rgba(255,36,66,0.10);
  }

  /* Card Cover */
  .card-cover {
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    transition: height 0.25s ease;
  }
  .card-cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.6));
  }
  .card-cover .cover-emoji {
    font-size: 44px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    transition: transform 0.3s ease;
  }
  .card:hover .cover-emoji { transform: scale(1.12); }
  .card-cover .cover-tag {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    color: #333;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    z-index: 2;
    letter-spacing: 0.3px;
  }
  .card-cover .cover-title {
    position: absolute;
    bottom: 12px;
    left: 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    z-index: 2;
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    letter-spacing: 0.5px;
  }

  /* Card Body */
  .card-body { padding: 14px 16px 16px; }
  .card-body .card-brief {
    font-size: 12px;
    color: #86868b;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-body .card-meta {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
  }
  .card-body .card-meta span {
    font-size: 11px;
    color: #c0c0c0;
  }
  .card-body .card-meta span em {
    font-style: normal;
    color: #ff2442;
    font-weight: 600;
  }
  .expand-indicator {
    margin-left: auto;
    color: #ff2442;
    font-size: 12px;
    font-weight: 700;
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .expand-indicator::before { content: '展开 '; font-weight: 400; }
  .card.open .expand-indicator { transform: rotate(180deg); }
  .card.open .expand-indicator::before { content: '收起 '; }

  /* Card Expanded - animation */
  .card-expand {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.4s ease;
  }
  .card.open .card-expand { grid-template-rows: 1fr; }

  .card-expand-inner {
    overflow: hidden;
    background: #fafafa;
  }
  .card-expand-inner .expand-content {
    padding: 20px;
  }

  /* Flow Tags */
  .flow-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px dashed #e8e8ed;
  }
  .flow-tags .tag {
    background: #fff;
    border: 1px solid #e8e8ed;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    color: #666;
    font-weight: 500;
  }
  .flow-tags .arrow { color: #d0d0d5; font-size: 12px; line-height: 26px; }

  /* Node Details */
  .node-list { display: flex; flex-direction: column; gap: 12px; }
  .node-item {
    background: #fff;
    border: 1px solid #eee;
    border-left: 3px solid #ddd;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    transition: border-left-color 0.2s, box-shadow 0.2s;
  }
  .node-item:hover {
    border-left-color: #ff2442;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .node-item .node-title {
    font-size: 13px;
    font-weight: 700;
    color: #1d1d1f;
    margin-bottom: 4px;
  }
  .node-item .node-desc {
    font-size: 12px;
    color: #86868b;
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .node-item .tips {
    display: flex; flex-direction: column; gap: 6px;
  }
  .node-item .tip {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    line-height: 1.6;
  }
  .node-item .tip.optimize {
    background: #f0faf0;
    color: #2d6a2d;
  }
  .node-item .tip.optimize .tag { color: #4caf50; font-weight: 600; margin-right: 4px; }
  .node-item .tip.commercial {
    background: #fef2f2;
    color: #b91c1c;
  }
  .node-item .tip.commercial .tag { color: #ff2442; font-weight: 600; margin-right: 4px; }

  /* Summary */
  .card-summary {
    margin-top: 16px;
    background: #fff;
    border: 1px solid #eee;
    border-left: 3px solid #ff2442;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
  }
  .card-summary .label {
    font-size: 11px;
    color: #ff2442;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card-summary .text {
    font-size: 12px;
    color: #555;
    line-height: 1.8;
  }

  /* Goal Bar */
  .goal-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #f0f0f0;
  }
  .goal-label {
    font-size: 13px;
    font-weight: 700;
    color: #ff2442;
    white-space: nowrap;
  }
  .goal-track {
    flex: 1;
    max-width: 200px;
    height: 6px;
    background: #f0f0f0;
    border-radius: 3px;
    overflow: hidden;
  }
  .goal-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff2442, #ff6b81);
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .goal-text {
    font-size: 12px;
    color: #86868b;
    white-space: nowrap;
  }
  .goal-text span { color: #ff2442; font-weight: 700; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 28px 20px;
    color: #c0c0c0;
    font-size: 12px;
    border-top: 1px solid #eee;
    margin-top: 10px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .grid { margin: -4px; }
    .grid > .card { padding: 4px; }
    .header { padding: 32px 16px 24px; }
    .header .stats { gap: 20px; }
    .card-cover { height: 120px; }
    .card-cover .cover-emoji { font-size: 36px; }
    .card-cover .cover-title { font-size: 13px; }
  }

  /* 多列模式（≥960px 3列 或 ≥1280px 4列）下，卡片内容更紧凑 */
  @media (min-width: 960px) {
    .card-cover { height: 110px; }
    .card-cover .cover-emoji { font-size: 34px; }
    .card-cover .cover-title { font-size: 12px; }
    .card-body { padding: 10px 12px 12px; }
    .expand-content { padding: 14px; }
    .node-item { padding: 10px 12px; }
    .node-item .node-desc { font-size: 11px; line-height: 1.5; }
    .flow-tags { gap: 4px; margin-bottom: 14px; padding-bottom: 12px; }
    .flow-tags .tag { font-size: 10px; padding: 2px 8px; }
    .card-summary { padding: 10px 12px; }
    .card-summary .text { font-size: 11px; line-height: 1.6; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <h1>场景<span>仓库</span></h1>
  </div>
  <p>AI 对话驱动开发 · 节点拆解 × 商业化优化指南</p>
  <div class="stats">
    <div class="stats-item"><div class="num" id="totalScenarios">0</div><div class="label">场景</div></div>
    <div class="stats-item"><div class="num" id="totalNodes">0</div><div class="label">节点</div></div>
    <div class="stats-item"><div class="num" id="totalTips">0</div><div class="label">优化建议</div></div>
  </div>
  <div class="goal-bar">
    <div class="goal-label">🎯 目标</div>
    <div class="goal-track"><div class="goal-fill" id="goalFill" style="width:0%"></div></div>
    <div class="goal-text"><span id="goalCurrent">0</span> / 300 个生活场景</div>

</div>

<div class="container" id="app"></div>

<div class="footer">© 场景仓库 · 持续更新</div>

  const app = document.getElementById('app');
  let totalNodes = 0, totalTips = 0;

  scenarios.forEach(s => {
    const nodeCount = s.nodes.length;
    const tipCount = s.nodes.reduce((sum, n) => sum + n.tips.length, 0);
    totalNodes += nodeCount;
    totalTips += tipCount;
  });

  let html = '<div class="grid">';
  scenarios.forEach(s => {
    const nodeCount = s.nodes.length;
    const tipCount = s.nodes.reduce((sum, n) => sum + n.tips.length, 0);

    html += `
      <div class="card" id="s-${s.id}">
        <div class="card-cover" style="background-image:url(https://picsum.photos/seed/${s.id}/600/300),linear-gradient(135deg,${s.color}18 0%,${s.color}44 100%)" onclick="toggleCard('${s.id}')">
          <div class="cover-emoji">${s.icon}</div>
          <span class="cover-tag">${nodeCount}步流程</span>
          <div class="cover-title">${s.title}</div>
        </div>
        <div class="card-body" onclick="toggleCard('${s.id}')">
          <div class="card-brief">${s.brief}</div>
          <div class="card-meta">
            <span>📋 <em>${nodeCount}</em> 节点</span>
            <span>💡 <em>${tipCount}</em> 建议</span>
            <span class="expand-indicator">∨</span>
          </div>
        </div>
        <div class="card-expand">
          <div class="card-expand-inner">
            <div class="expand-content">
            <div class="flow-tags">
              ${s.flow.map((n, i) => `
                ${i > 0 ? '<span class="arrow">→</span>' : ''}
                <span class="tag">${n}</span>
              `).join('')}
            </div>
            <div class="node-list">
              ${s.nodes.map(n => `
                <div class="node-item">
                  <div class="node-title">🔹 ${n.title}</div>
                  <div class="node-desc">${n.desc}</div>
                  <div class="tips">
                    ${n.tips.map(t => `
                      <span class="tip ${t.type}">
                        <span class="tag">${t.type === 'commercial' ? '💰 商业化' : '⚡ 优化'}</span>

                    `).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
            <div class="card-summary">
              <div class="label">📌 商业化总览</div>
              <div class="text">${s.summary}</div>
            </div>
          </div>
        </div>
      </div>
    `;
  });
  html += '</div>';

  app.innerHTML = html;
  document.getElementById('totalScenarios').textContent = scenarios.length;
  document.getElementById('totalNodes').textContent = totalNodes;
  document.getElementById('totalTips').textContent = totalTips;
  document.getElementById('goalCurrent').textContent = scenarios.length;
  const goalFill = document.getElementById('goalFill');
  const pct = Math.min(100, (scenarios.length / 300) * 100);
  goalFill.style.width = pct.toFixed(1) + '%';
}

function toggleCard(id) {
  const el = document.getElementById('s-' + id);
  el.classList.toggle('open');
}

function updateCardLayout() {
  const w = window.innerWidth;
  let cols = 2;
  if (w <= 640) cols = 1;
  else if (w >= 1280) cols = 4;
  else if (w >= 960) cols = 3;

  const cards = document.querySelectorAll('.grid > .card');
  cards.forEach(c => c.style.width = (100 / cols) + '%');
}

render();
updateCardLayout();
window.addEventListener('resize', updateCardLayout);
</script>
</body>
</html>
