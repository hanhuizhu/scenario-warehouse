  .scenario.open .scenario-body { display: block; }

          { type: 'optimize', text: '一键部署：代码完成 → 符合规范 → 自动推送 → 自动发布' },
          { type: 'optimize', text: '部署回滚：保留历史版本，异常时一键回滚' },
          { type: 'commercial', text: 'AI DevOps托管：从需求到上线全托管服务，按月订阅' },
        ]},
    ],
    summary: 'AI对话驱动开发是以上所有场景的「大脑」—— 统一入口，智能编排。可发展为「AI软件工厂」：用户提需求 → 系统自动完成开发→测试→部署全流程。面向中小企业、外包团队、个人开发者，按项目或订阅收费。'
  }
];

// Render
function render() {
  const app = document.getElementById('app');
  let totalNodes = 0, totalTips = 0;

  let html = '';
  scenarios.forEach(s => {
    const nodeCount = s.nodes.length;
    const tipCount = s.nodes.reduce((sum, n) => sum + n.tips.length, 0);
    totalNodes += nodeCount;
    totalTips += tipCount;

    html += `
      <div class="scenario" id="s-${s.id}">
        <div class="scenario-header" onclick="toggleScenario('${s.id}')">
          <div class="left">
            <div class="icon" style="background:${s.color}22">${s.icon}</div>
            <div class="info">
              <h3>${s.title}</h3>
              <div class="brief">${s.brief} · ${nodeCount}节点 ${tipCount}建议</div>
            </div>
          </div>
          <div class="toggle">▼</div>
        </div>
        <div class="scenario-body">
          <div class="flow">
            ${s.flow.map((n, i) => `
              ${i > 0 ? '<span class="arrow">→</span>' : ''}
              <span class="node">${n}</span>
            `).join('')}
          </div>
          <div class="node-list">
            ${s.nodes.map(n => `
              <div class="node-item">
                <div class="node-title">${n.title}</div>
                <div class="node-desc">${n.desc}</div>
                <div class="tips">
                  ${n.tips.map(t => `
                    <span class="tip ${t.type === 'commercial' ? 'commercial' : ''}">
                      ${t.type === 'commercial' ? '💰' : '⚡'} <span class="tag">${t.type === 'commercial' ? '商业化' : '优化'}</span>
                      ${t.text}
                    </span>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
          <div class="summary">
            <div class="label">📋 商业化总览</div>
            <div class="text">${s.summary}</div>
          </div>
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
  document.getElementById('totalScenarios').textContent = scenarios.length;
  document.getElementById('totalNodes').textContent = totalNodes;
  document.getElementById('totalTips').textContent = totalTips;
}

function toggleScenario(id) {
  const el = document.getElementById('s-' + id);
  el.classList.toggle('open');
}

render();
</script>
</body>
</html>
